services:
  vault-guardian:
    image: ghcr.io/vineetkishore01/vault-guardian:latest
    container_name: vault-guardian
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - vault-data:/app/data
      - vault-logs:/app/logs
      - vault-reports:/app/reports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

volumes:
  vault-data:
    driver: local
  vault-logs:
    driver: local
  vault-reports:
    driver: local
